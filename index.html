<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вишлист — мечты сбываются</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #f8fafc, #eef2f8);
            font-family: 'Inter', sans-serif;
            color: #0a1c2f;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9c3d4;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8f9bb3;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Шапка с анимацией */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d6406a, #7b3f9e, #2c5f8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .hero h1 i {
            font-size: 2.8rem;
            color: #e9b35f;
            background: none;
            -webkit-background-clip: unset;
        }
        .subhead {
            font-size: 1.1rem;
            color: #4c6f8c;
            margin-top: 0.6rem;
            font-weight: 400;
            border-bottom: 2px dashed rgba(100, 120, 150, 0.3);
            display: inline-block;
            padding-bottom: 6px;
        }

        /* Табы — стеклянные */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1e3a5f;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            font-family: inherit;
        }
        .tab-btn i {
            margin-right: 8px;
            font-size: 1rem;
        }
        .tab-btn.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
            box-shadow: 0 8px 20px rgba(30,58,95,0.25);
        }
        .tab-btn:not(.active):hover {
            background: rgba(255,255,240,0.9);
            transform: translateY(-2px);
        }

        /* сетка карточек */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 2rem;
            animation: fadeInUp 0.4s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Карточка — элегантная */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.02);
            transition: all 0.35s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.25);
            border-color: rgba(106, 78, 155, 0.2);
        }
        .card.completed {
            opacity: 0.75;
            background: #ecf1f7;
            filter: grayscale(0.08);
        }
        .card.completed .card-title,
        .card.completed .card-desc,
        .card.completed .price {
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: #2a6b2f;
        }
        .card.completed .buy-link {
            background: #7f8c8d;
            pointer-events: none;
            opacity: 0.7;
        }
        .completed-badge {
            display: none;
            font-size: 0.7rem;
            background: #2a7f2e;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            width: fit-content;
            margin-top: 10px;
            align-items: center;
            gap: 6px;
        }
        .card.completed .completed-badge {
            display: inline-flex;
        }

        /* Чекбокс */
        .complete-checkbox {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 12;
            background: rgba(255, 248, 235, 0.95);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid #ffffffcc;
            transition: all 0.2s;
            font-weight: 500;
        }
        .complete-checkbox:hover {
            background: white;
            transform: scale(1.02);
        }
        .complete-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e3a5f;
        }

        /* картинка */
        .card-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .card:hover .card-img {
            transform: scale(1.02);
        }
        .no-image {
            background: #e2e8f0;
            height: 210px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a6e8a;
            font-size: 0.9rem;
            gap: 8px;
        }

        .card-content {
            padding: 1.5rem 1.3rem 1.6rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.45rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.5rem;
            color: #0e2a3b;
        }
        .card-desc {
            font-size: 0.9rem;
            line-height: 1.45;
            color: #4a627a;
            margin-bottom: 1rem;
        }
        .price {
            font-weight: 700;
            font-size: 1.25rem;
            color: #1f4870;
            margin: 0.6rem 0 0.8rem;
            border-top: 1px solid #e2edf7;
            padding-top: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .price i {
            color: #e9b35f;
            font-size: 1rem;
        }

        .buy-link {
            background: #1f4870;
            color: white;
            text-decoration: none;
            padding: 11px 18px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-top: auto;
            border: none;
            cursor: pointer;
        }
        .buy-link:hover {
            background: #0f2f4a;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(31,72,112,0.25);
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            font-size: 0.85rem;
            color: #5b6e86;
            background: rgba(255, 255, 245, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 80px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(106, 78, 155, 0.15);
        }

        .loading, .empty-message {
            text-align: center;
            padding: 3rem;
            font-size: 1.1rem;
            color: #5e7c9c;
            background: rgba(255,255,245,0.5);
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .empty-message i {
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        /* плавное переключение вкладок */
        .fade-transition {
            transition: opacity 0.2s ease;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .tab-btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.85rem;
            }
            .card-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>
            <i class="fas fa-star-of-life"></i>
            Список желаний
            <i class="fas fa-gift"></i>
        </h1>
        <div class="subhead">
            <i class="fas fa-check-circle"></i> отмечайте исполненное — оно перемещается в отдельный раздел
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="active"><i class="fas fa-heart"></i> Активные</button>
        <button class="tab-btn" data-tab="completed"><i class="fas fa-check-double"></i> Исполненные</button>
    </div>

    <div id="activeGrid" class="wishlist-grid"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>
    <div id="completedGrid" class="wishlist-grid" style="display: none;"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>

    <div class="footer-note">
        <i class="fas fa-database"></i> Данные из Google Таблицы • синхронизация в реальном времени
    </div>
</div>

<script>
    // ========== ВАШ URL APPS SCRIPT ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbzq6J8alPSiusKLw1FER8x82TiWsY-c0tqHOlKCmEFm0U5UXv16kCNhnNpieTgO8pCp/exec';  // ЗАМЕНИТЕ НА СВОЙ
    let allItems = [];
    let currentTab = 'active';

    async function fetchData() {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const items = await response.json();
        return items.map(item => ({
            ...item,
            completed: (item.completed === 'TRUE' || item.completed === true)
        }));
    }

    async function saveCompleted(id, completed) {
        const value = completed ? 'TRUE' : 'FALSE';
        await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ id, completed: value })
        });
        setTimeout(() => loadAndRender(), 300);
    }

    function renderGrids(items) {
        const activeContainer = document.getElementById('activeGrid');
        const completedContainer = document.getElementById('completedGrid');
        const activeItems = items.filter(item => !item.completed);
        const completedItems = items.filter(item => item.completed);
        
        activeContainer.innerHTML = '';
        completedContainer.innerHTML = '';
        
        if (activeItems.length === 0) {
            activeContainer.innerHTML = '<div class="empty-message"><i class="fas fa-cloud-moon"></i>Пока нет активных желаний<br><small>добавьте в Google Таблицу</small></div>';
        } else {
            activeItems.forEach(item => activeContainer.appendChild(createCardElement(item)));
        }
        
        if (completedItems.length === 0) {
            completedContainer.innerHTML = '<div class="empty-message"><i class="fas fa-check-circle"></i>Здесь появятся исполненные мечты 🎉</div>';
        } else {
            completedItems.forEach(item => completedContainer.appendChild(createCardElement(item)));
        }
    }
    
    function createCardElement(item) {
        const card = document.createElement('div');
        card.className = 'card';
        if (item.completed) card.classList.add('completed');
        
        let imgHtml = '';
        if (item.imageUrl && item.imageUrl.trim()) {
            imgHtml = `<img class="card-img" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.onerror=null;this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
            imgHtml += `<div class="no-image" style="display: none;"><i class="fas fa-image"></i> фото не загрузилось</div>`;
        } else {
            imgHtml = `<div class="no-image"><i class="fas fa-camera"></i> нет фото</div>`;
        }
        
        const badge = `<div class="completed-badge"><i class="fas fa-check-circle"></i> Исполнено!</div>`;
        const contentHtml = `
            <div class="card-content">
                <div class="card-title">${escapeHtml(item.title)}</div>
                <div class="card-desc">${escapeHtml(item.description || '')}</div>
                <div class="price"><i class="fas fa-tag"></i> ${escapeHtml(String(item.price))}</div>
                ${badge}
                <a href="${escapeHtml(item.shopLink)}" class="buy-link" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-cart-shopping"></i> ${escapeHtml(item.buttonText || 'Купить')}
                </a>
            </div>
        `;
        card.innerHTML = imgHtml + contentHtml;
        
        const chkDiv = document.createElement('div');
        chkDiv.className = 'complete-checkbox';
        const chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.checked = item.completed;
        chk.addEventListener('change', async (e) => {
            e.stopPropagation();
            const newCompleted = chk.checked;
            chk.disabled = true;
            await saveCompleted(item.id, newCompleted);
            // чекбокс снова активируется после перерисовки
        });
        chkDiv.appendChild(chk);
        chkDiv.appendChild(document.createTextNode(' Исполнено'));
        card.style.position = 'relative';
        card.appendChild(chkDiv);
        return card;
    }
    
    async function loadAndRender() {
        try {
            allItems = await fetchData();
            renderGrids(allItems);
            document.querySelectorAll('.wishlist-grid').forEach(grid => grid.style.display = 'none');
            if (currentTab === 'active') {
                document.getElementById('activeGrid').style.display = 'grid';
            } else {
                document.getElementById('completedGrid').style.display = 'grid';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('activeGrid').innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки. Проверьте URL скрипта.</div>';
            document.getElementById('completedGrid').innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки</div>';
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Обработка табов с плавной сменой
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentTab === btn.dataset.tab) return;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            // лёгкая анимация смены контента
            const activeGrid = document.getElementById('activeGrid');
            const completedGrid = document.getElementById('completedGrid');
            activeGrid.style.opacity = '0';
            completedGrid.style.opacity = '0';
            setTimeout(() => {
                if (currentTab === 'active') {
                    activeGrid.style.display = 'grid';
                    completedGrid.style.display = 'none';
                } else {
                    activeGrid.style.display = 'none';
                    completedGrid.style.display = 'grid';
                }
                setTimeout(() => {
                    activeGrid.style.opacity = '1';
                    completedGrid.style.opacity = '1';
                }, 20);
            }, 100);
        });
    });
    
    loadAndRender();
    setInterval(loadAndRender, 20000);
</script>
</body>
</html>
