<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вишлист — мечты сбываются</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 30%, #f8fafc, #eef2f8);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Шапка */
        .hero { text-align: center; margin-bottom: 3rem; }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d6406a, #7b3f9e, #2c5f8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: block;
            margin-bottom: 1rem;
        }
        .hero h1 i { font-size: 2.8rem; color: #e9b35f; margin: 0 0.25rem; }
        .subhead {
            font-size: 1.1rem;
            color: #4c6f8c;
            border-bottom: 2px dashed rgba(100,120,150,0.3);
            display: inline-block;
            padding-bottom: 6px;
        }

        /* Табы */
        .tabs { display: flex; justify-content: center; gap: 1.2rem; margin-bottom: 2.5rem; }
        .tab-btn {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.8);
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #1e3a5f;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #1e3a5f;
            color: white;
            box-shadow: 0 8px 20px rgba(30,58,95,0.25);
        }

        /* Сетка — 3 колонки */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(280px, 1fr));
            gap: 2rem;
        }
        @media (max-width: 1000px) { .wishlist-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .wishlist-grid { grid-template-columns: 1fr; } }

        /* Карточка */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            transition: 0.35s;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
        }
        .card:hover { transform: translateY(-8px) scale(1.01); }

        .card.completed { opacity: 0.75; background: #ecf1f7; filter: grayscale(0.08); }
        .card.completed .card-title,
        .card.completed .card-desc,
        .card.completed .price { text-decoration: line-through; }
        .card.completed .buy-link { background: #7f8c8d; pointer-events: none; opacity: 0.7; }
        
        .completed-badge {
            display: none;
            font-size: 0.7rem;
            background: #2a7f2e;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            width: fit-content;
            margin-top: 10px;
            align-items: center;
            gap: 6px;
        }
        .card.completed .completed-badge { display: inline-flex; }

        /* Чекбокс */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0.8rem 0 0.5rem;
            padding: 6px 0;
            border-top: 1px solid #e2edf7;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            width: fit-content;
        }
        .checkbox-wrapper input { width: 18px; height: 18px; cursor: pointer; accent-color: #1e3a5f; }

        /* Кнопка "Распечатай" */
        .print-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(255,255,240,0.9);
            backdrop-filter: blur(4px);
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #d4deec;
            transition: 0.2s;
        }
        .print-btn:hover { background: #ffe5b4; transform: scale(1.02); }
        .print-badge {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 32px;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }
        .card.print-mode .print-badge {
            display: flex;
        }

        /* Картинка */
        .card-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: 0.4s;
        }
        .card:hover .card-img { transform: scale(1.02); }
        .no-image {
            background: #e2e8f0;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a6e8a;
            gap: 8px;
        }

        /* Контент */
        .card-content {
            padding: 1.5rem 1.3rem 1.6rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title { font-size: 1.45rem; font-weight: 700; margin-bottom: 0.5rem; }
        .card-desc { font-size: 0.9rem; color: #4a627a; margin-bottom: 1rem; line-height: 1.4; }
        .price {
            font-weight: 700;
            font-size: 1.25rem;
            color: #1f4870;
            margin: 0.6rem 0 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .price i { color: #e9b35f; }

        .buy-link {
            background: #1f4870;
            color: white;
            text-decoration: none;
            padding: 11px 18px;
            border-radius: 60px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 0.8rem;
            transition: 0.2s;
        }
        .buy-link:hover { background: #0f2f4a; transform: translateY(-2px); }

        /* Карточка добавления */
        .add-card {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            border: 2px dashed #8fa4c2;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: 0.2s;
        }
        .add-card:hover {
            background: rgba(255,255,240,0.9);
            transform: scale(1.02);
        }
        .add-card-content {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: #2c3e66;
        }
        .add-card-content i { font-size: 3rem; }
        .add-card-content span { font-size: 1.2rem; font-weight: 600; }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
        }
        .modal-content button {
            background: #1f4870;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .close-btn {
            background: #ccc !important;
            margin-left: 10px;
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            font-size: 0.85rem;
            color: #5b6e86;
            background: rgba(255,255,245,0.7);
            backdrop-filter: blur(4px);
            border-radius: 80px;
            width: fit-content;
            margin: 2rem auto 0;
        }
        .loading, .empty-message {
            text-align: center;
            padding: 3rem;
            font-size: 1.1rem;
            color: #5e7c9c;
            background: rgba(255,255,245,0.5);
            border-radius: 60px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-star-of-life"></i> Список желаний <i class="fas fa-gift"></i></h1>
        <div class="subhead"><i class="fas fa-check-circle"></i> отмечайте исполненное — оно перемещается в отдельный раздел</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="active"><i class="fas fa-heart"></i> Активные</button>
        <button class="tab-btn" data-tab="completed"><i class="fas fa-check-double"></i> Исполненные</button>
    </div>
    <div id="activeGrid" class="wishlist-grid"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>
    <div id="completedGrid" class="wishlist-grid" style="display: none;"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>
    <div class="footer-note"><i class="fas fa-database"></i> Данные из Google Таблицы • синхронизация в реальном времени</div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>✨ Новая хотелка</h3>
        <input type="text" id="newTitle" placeholder="Название *" required>
        <textarea id="newDesc" placeholder="Описание (необязательно)" rows="2"></textarea>
        <input type="text" id="newPrice" placeholder="Цена, например 1500 ₽">
        <input type="text" id="newImageUrl" placeholder="Ссылка на картинку (URL)">
        <input type="text" id="newShopLink" placeholder="Ссылка на покупку (URL)">
        <input type="text" id="newButtonText" placeholder="Текст на кнопке" value="Купить">
        <div style="margin-top: 1rem;">
            <button id="saveWishBtn">➕ Добавить</button>
            <button id="closeModalBtn" class="close-btn">Отмена</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz2Xm78IrBSzRbO-u9OyRXSscIJ3ebpM_GvRVq4qfNWlmlbec9HPGUrC8c0Onp2oM5T/exec';  // ЗАМЕНИТЕ НА ВАШ НОВЫЙ URL
    let allItems = [];
    let currentTab = 'active';

    async function fetchData() {
        const resp = await fetch(API_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const items = await resp.json();
        return items.map(item => ({
            ...item,
            completed: (item.completed === 'TRUE' || item.completed === true)
        }));
    }

    async function saveCompleted(id, completed) {
        const value = completed ? 'TRUE' : 'FALSE';
        await fetch(`${API_URL}?id=${id}&completed=${value}`);
        setTimeout(() => loadAndRender(), 300);
    }

    async function addWish(wishData) {
        const params = new URLSearchParams({
            add: '1',
            title: wishData.title,
            description: wishData.description || '',
            price: wishData.price || '',
            imageUrl: wishData.imageUrl || '',
            shopLink: wishData.shopLink || '',
            buttonText: wishData.buttonText || 'Купить'
        });
        const resp = await fetch(`${API_URL}?${params.toString()}`);
        const result = await resp.json();
        if (result.success) {
            alert('Хотелка добавлена!');
            loadAndRender();
        } else {
            alert('Ошибка при добавлении');
        }
    }

    function togglePrintMode(card, btn) {
        if (card.classList.contains('print-mode')) {
            card.classList.remove('print-mode');
            btn.style.background = 'rgba(255,255,240,0.9)';
        } else {
            card.classList.add('print-mode');
            btn.style.background = '#ffd966';
        }
    }

    function renderGrids(items) {
        const activeContainer = document.getElementById('activeGrid');
        const completedContainer = document.getElementById('completedGrid');
        const activeItems = items.filter(i => !i.completed);
        const completedItems = items.filter(i => i.completed);
        activeContainer.innerHTML = '';
        completedContainer.innerHTML = '';
        
        // Добавляем карточку-плюс только в активные
        if (currentTab === 'active') {
            const addCard = document.createElement('div');
            addCard.className = 'card add-card';
            addCard.innerHTML = `
                <div class="add-card-content">
                    <i class="fas fa-plus-circle"></i>
                    <span>Добавить хотелку</span>
                </div>
            `;
            addCard.addEventListener('click', () => {
                document.getElementById('addModal').style.display = 'flex';
            });
            activeContainer.appendChild(addCard);
        }
        
        if (activeItems.length === 0 && currentTab === 'active') {
            if (activeContainer.children.length === 0) // только плюс
                activeContainer.innerHTML += '<div class="empty-message"><i class="fas fa-cloud-moon"></i>Пока нет активных желаний</div>';
        } else {
            activeItems.forEach(item => activeContainer.appendChild(createCard(item)));
        }
        
        if (completedItems.length === 0) {
            completedContainer.innerHTML = '<div class="empty-message"><i class="fas fa-check-circle"></i>Здесь появятся исполненные мечты 🎉</div>';
        } else {
            completedItems.forEach(item => completedContainer.appendChild(createCard(item)));
        }
    }
    
    function createCard(item) {
        const card = document.createElement('div');
        card.className = 'card';
        if (item.completed) card.classList.add('completed');
        
        let imgHtml = (item.imageUrl && item.imageUrl.trim()) ? 
            `<img class="card-img" src="${escapeHtml(item.imageUrl)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" loading="lazy"><div class="no-image" style="display: none;"><i class="fas fa-image"></i> фото не загрузилось</div>` :
            `<div class="no-image"><i class="fas fa-camera"></i> нет фото</div>`;
        
        let priceText = String(item.price).trim();
        if (!priceText.includes('₽') && !priceText.includes('руб')) priceText += ' ₽';
        
        card.innerHTML = `
            <div class="print-btn" title="Пометить на печать"><i class="fas fa-print"></i> Распечатай</div>
            <div class="print-badge"><i class="fas fa-print"></i> РАСПЕЧАТАТЬ!</div>
            ${imgHtml}
            <div class="card-content">
                <div class="card-title">${escapeHtml(item.title)}</div>
                <div class="card-desc">${escapeHtml(item.description || '')}</div>
                <div class="price"><i class="fas fa-tag"></i> ${escapeHtml(priceText)}</div>
                <div class="completed-badge"><i class="fas fa-check-circle"></i> Исполнено!</div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" class="complete-chk" data-id="${item.id}" ${item.completed ? 'checked' : ''}>
                    <span>Исполнено</span>
                </div>
                <a href="${escapeHtml(item.shopLink)}" class="buy-link" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-cart-shopping"></i> ${escapeHtml(item.buttonText || 'Купить')}
                </a>
            </div>
        `;
        
        const chk = card.querySelector('.complete-chk');
        chk.addEventListener('change', async () => {
            chk.disabled = true;
            await saveCompleted(item.id, chk.checked);
        });
        
        const printBtn = card.querySelector('.print-btn');
        printBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePrintMode(card, printBtn);
        });
        
        return card;
    }
    
    async function loadAndRender() {
        try {
            allItems = await fetchData();
            renderGrids(allItems);
            document.querySelectorAll('.wishlist-grid').forEach(g => g.style.display = 'none');
            if (currentTab === 'active') {
                document.getElementById('activeGrid').style.display = 'grid';
            } else {
                document.getElementById('completedGrid').style.display = 'grid';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('activeGrid').innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки. Проверьте URL скрипта.</div>';
        }
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    
    // Обработка модалки
    const modal = document.getElementById('addModal');
    document.getElementById('closeModalBtn').addEventListener('click', () => modal.style.display = 'none');
    document.getElementById('saveWishBtn').addEventListener('click', async () => {
        const title = document.getElementById('newTitle').value.trim();
        if (!title) { alert('Введите название'); return; }
        const wish = {
            title,
            description: document.getElementById('newDesc').value,
            price: document.getElementById('newPrice').value,
            imageUrl: document.getElementById('newImageUrl').value,
            shopLink: document.getElementById('newShopLink').value,
            buttonText: document.getElementById('newButtonText').value || 'Купить'
        };
        await addWish(wish);
        modal.style.display = 'none';
        // очистить поля
        document.getElementById('newTitle').value = '';
        document.getElementById('newDesc').value = '';
        document.getElementById('newPrice').value = '';
        document.getElementById('newImageUrl').value = '';
        document.getElementById('newShopLink').value = '';
        document.getElementById('newButtonText').value = 'Купить';
    });
    window.onclick = (event) => { if (event.target === modal) modal.style.display = 'none'; };
    
    // Табы
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentTab === btn.dataset.tab) return;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            const ag = document.getElementById('activeGrid');
            const cg = document.getElementById('completedGrid');
            ag.style.opacity = '0';
            cg.style.opacity = '0';
            setTimeout(() => {
                if (currentTab === 'active') { ag.style.display = 'grid'; cg.style.display = 'none'; }
                else { ag.style.display = 'none'; cg.style.display = 'grid'; }
                setTimeout(() => { ag.style.opacity = '1'; cg.style.opacity = '1'; loadAndRender(); }, 20);
            }, 100);
        });
    });
    
    loadAndRender();
    setInterval(loadAndRender, 20000);
</script>
</body>
</html>
