<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вишлист — с перетаскиванием (локальный порядок)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 30%, #f8fafc, #eef2f8);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 2rem; }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d6406a, #7b3f9e, #2c5f8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: block;
            margin-bottom: 0.5rem;
        }
        .hero h1 i { font-size: 2.8rem; color: #e9b35f; margin: 0 0.25rem; }
        .subhead { font-size: 1rem; color: #4c6f8c; border-bottom: 2px dashed rgba(100,120,150,0.3); display: inline-block; padding-bottom: 6px; }
        .filters { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.8); padding: 0.5rem 1.2rem; border-radius: 60px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: #1e3a5f; }
        .filter-btn.active { background: #1e3a5f; color: white; }
        .tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
        .tab-btn { background: rgba(255,255,255,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.8); padding: 0.5rem 1.5rem; border-radius: 60px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: #1e3a5f; }
        .tab-btn.active { background: #1e3a5f; color: white; }
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        @media (max-width: 1000px) { .wishlist-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .wishlist-grid { grid-template-columns: 1fr; } }
        .card {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            border: 2px solid;
            cursor: grab;
        }
        .card:active { cursor: grabbing; }
        .card.owner-me { background: #e0f2fe; border-color: #7ab3c8; }
        .card.owner-wife { background: #ffe4e6; border-color: #e6a0b0; }
        .card.owner-common { background: #f3f4f6; border-color: #9ca3af; }
        .card.completed { opacity: 0.7; filter: grayscale(0.1); }
        .card.completed .card-title, .card.completed .card-desc, .card.completed .price { text-decoration: line-through; }
        .card.completed .buy-link { background: #7f8c8d; pointer-events: none; opacity: 0.7; }
        .completed-badge { display: none; font-size: 0.7rem; background: #2a7f2e; color: white; padding: 4px 12px; border-radius: 40px; width: fit-content; margin-top: 8px; }
        .card.completed .completed-badge { display: inline-flex; align-items: center; gap: 5px; }
        .card-actions {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 6px;
            z-index: 20;
            flex-wrap: nowrap;
        }
        .action-btn {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            color: white;
            padding: 6px 10px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            transition: 0.2s;
            min-width: 36px;
        }
        .action-btn i { font-size: 0.9rem; }
        .action-btn span { display: none; }
        .action-btn:hover { background: rgba(0,0,0,0.85); transform: scale(1.02); }
        .delete-btn:hover { background: #b91c1c; }
        .owner-switch {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            color: white;
            padding: 6px 8px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border: none;
            width: 48px;
            text-align: center;
        }
        .owner-switch:hover { background: rgba(0,0,0,0.85); }
        .print-badge {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            pointer-events: none;
            z-index: 30;
        }
        .card.print-mode .print-badge { display: flex; }
        .card-img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .no-image { background: #e2e8f0; height: 220px; display: flex; align-items: center; justify-content: center; color: #5a6e8a; gap: 5px; }
        .card-content { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
        .card-desc { font-size: 0.8rem; color: #4a627a; margin-bottom: 0.6rem; }
        .price { font-weight: 700; font-size: 1.1rem; color: #1f4870; margin: 0.3rem 0; display: flex; align-items: center; gap: 5px; }
        .buy-link {
            background: #1f4870; color: white; text-decoration: none; padding: 6px 12px;
            border-radius: 60px; font-weight: 600; font-size: 0.8rem;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 0.5rem;
        }
        .checkbox-wrapper {
            display: flex; align-items: center; gap: 6px; margin: 0.5rem 0 0;
            padding-top: 5px; border-top: 1px solid #e2edf7;
        }
        .add-card {
            background: rgba(255,255,255,0.6);
            border: 2px dashed #8fa4c2;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .add-card-content { padding: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 8px 12px;
            margin: 6px 0;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
        }
        .modal-content button {
            background: #1f4870; color: white; border: none;
            padding: 8px 16px; border-radius: 60px; cursor: pointer;
            margin-top: 8px;
        }
        .close-btn { background: #ccc !important; margin-left: 8px; }
        .footer-note { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #5b6e86; }
        .loading, .empty-message { text-align: center; padding: 2rem; color: #5e7c9c; }
        @media (max-width: 640px) {
            .owner-switch { width: 42px; font-size: 1rem; }
            .action-btn { padding: 4px 8px; }
            .filter-btn { font-size: 0.8rem; padding: 0.4rem 1rem; }
            .tab-btn { font-size: 0.8rem; padding: 0.4rem 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-star-of-life"></i> Список желаний <i class="fas fa-gift"></i></h1>
        <div class="subhead">Перетаскивайте карточки — порядок сохранится у вас</div>
    </div>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">👥 Все</button>
        <button class="filter-btn" data-filter="me">👨 Мои</button>
        <button class="filter-btn" data-filter="wife">👩 Жены</button>
        <button class="filter-btn" data-filter="common">🤝 Общие</button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="active">📌 Активные</button>
        <button class="tab-btn" data-tab="completed">✅ Исполненные</button>
    </div>
    <div id="activeGrid" class="wishlist-grid"><div class="loading">⏳ Загрузка...</div></div>
    <div id="completedGrid" class="wishlist-grid" style="display: none;"><div class="loading">⏳ Загрузка...</div></div>
    <div class="footer-note">🔹 Голубые — ваши, розовые — для жены, серые — общие. Нажмите на иконку справа, чтобы сменить владельца.</div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">✏️ Редактировать</h3>
        <input type="text" id="editId" style="display:none;">
        <input type="text" id="editTitle" placeholder="Название *">
        <textarea id="editDesc" placeholder="Описание" rows="2"></textarea>
        <input type="text" id="editPrice" placeholder="Цена">
        <input type="text" id="editImageUrl" placeholder="Ссылка на картинку">
        <input type="text" id="editShopLink" placeholder="Ссылка на покупку">
        <input type="text" id="editButtonText" placeholder="Текст на кнопке" value="Купить">
        <select id="editOwner">
            <option value="common">🤝 Общее</option>
            <option value="me">👨 Моё</option>
            <option value="wife">👩 Для жены</option>
        </select>
        <div><button id="saveEditBtn">💾 Сохранить</button><button id="closeEditBtn" class="close-btn">Отмена</button></div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxZqR3_ToIqGm1pRRQrYo7nNfg0Y8527MMUWyzCCRHO_J4hU49SazwUMKaJPAUX_Pp0/exec'; // ЗАМЕНИТЕ НА ВАШ URL
    let allItems = [];
    let currentTab = 'active';
    let currentFilter = 'all';
    let printModeIds = [];
    let sortable = null;

    // Ключи для локального хранения порядка
    const ORDER_KEY_ACTIVE = 'wishlist_order_active';
    const ORDER_KEY_COMPLETED = 'wishlist_order_completed';

    function loadPrintModes() {
        const saved = localStorage.getItem('wishlist_print_modes');
        printModeIds = saved ? JSON.parse(saved) : [];
    }
    function savePrintModes() {
        localStorage.setItem('wishlist_print_modes', JSON.stringify(printModeIds));
    }

    // Загрузка порядка карточек из localStorage
    function getOrder(completed) {
        const key = completed ? ORDER_KEY_COMPLETED : ORDER_KEY_ACTIVE;
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : [];
    }
    function saveOrder(completed, orderArray) {
        const key = completed ? ORDER_KEY_COMPLETED : ORDER_KEY_ACTIVE;
        localStorage.setItem(key, JSON.stringify(orderArray));
    }

    // Применение порядка к массиву элементов
    function applyOrder(items, completed) {
        const order = getOrder(completed);
        if (!order.length) return items;
        // order хранит id карточек в нужной последовательности
        const ordered = [];
        const map = new Map(items.map(item => [item.id, item]));
        for (const id of order) {
            if (map.has(id)) {
                ordered.push(map.get(id));
                map.delete(id);
            }
        }
        // остальные (не вошедшие в order) добавляем в конец
        for (const item of map.values()) ordered.push(item);
        return ordered;
    }

    async function fetchData() {
        const resp = await fetch(API_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const items = await resp.json();
        return items.map(item => ({
            ...item,
            completed: (item.completed === 'TRUE' || item.completed === true),
            owner: item.owner || 'common'
        }));
    }

    async function saveCompleted(id, completed) {
        await fetch(`${API_URL}?id=${id}&completed=${completed ? 'TRUE' : 'FALSE'}`);
        await loadAndRender();
    }

    async function updateWish(id, wishData) {
        const params = new URLSearchParams({ update: '1', id, ...wishData });
        const resp = await fetch(`${API_URL}?${params.toString()}`);
        const result = await resp.json();
        if (result.success) await loadAndRender();
        return result.success;
    }

    async function addWish(wishData) {
        const params = new URLSearchParams({ add: '1', ...wishData });
        const resp = await fetch(`${API_URL}?${params.toString()}`);
        const result = await resp.json();
        if (result.success) await loadAndRender();
        return result.success;
    }

    async function deleteWish(id) {
        if (!confirm('Удалить хотелку?')) return false;
        const resp = await fetch(`${API_URL}?delete=1&id=${id}`);
        const result = await resp.json();
        if (result.success) await loadAndRender();
        return result.success;
    }

    async function setOwner(id, owner) {
        await fetch(`${API_URL}?setOwner=1&id=${id}&owner=${owner}`);
        await loadAndRender();
    }

    function togglePrintMode(card, id) {
        if (card.classList.contains('print-mode')) {
            card.classList.remove('print-mode');
            printModeIds = printModeIds.filter(pid => pid !== id);
        } else {
            card.classList.add('print-mode');
            if (!printModeIds.includes(id)) printModeIds.push(id);
        }
        savePrintModes();
    }

    function openEditModal(item) {
        document.getElementById('editId').value = item.id;
        document.getElementById('editTitle').value = item.title;
        document.getElementById('editDesc').value = item.description || '';
        document.getElementById('editPrice').value = item.price || '';
        document.getElementById('editImageUrl').value = item.imageUrl || '';
        document.getElementById('editShopLink').value = item.shopLink || '';
        document.getElementById('editButtonText').value = item.buttonText || 'Купить';
        document.getElementById('editOwner').value = item.owner || 'common';
        document.getElementById('modalTitle').innerText = '✏️ Редактировать хотелку';
        document.getElementById('editModal').style.display = 'flex';
    }

    function createCardElement(item) {
        const card = document.createElement('div');
        card.className = `card owner-${item.owner || 'common'}`;
        if (item.completed) card.classList.add('completed');
        if (printModeIds.includes(item.id)) card.classList.add('print-mode');
        card.dataset.id = item.id;

        let imgHtml = (item.imageUrl && item.imageUrl.trim()) ?
            `<img class="card-img" src="${escapeHtml(item.imageUrl)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" loading="lazy"><div class="no-image" style="display:none;">📷 нет фото</div>` :
            `<div class="no-image">📷 нет фото</div>`;
        let priceText = String(item.price).trim();
        if (!priceText.includes('₽') && !priceText.includes('руб')) priceText += ' ₽';

        let ownerEmoji = '';
        if (item.owner === 'me') ownerEmoji = '👨';
        else if (item.owner === 'wife') ownerEmoji = '👩';
        else ownerEmoji = '🤝';

        card.innerHTML = `
            <div class="card-actions">
                <div class="action-btn print-btn" title="Распечатай"><i class="fas fa-print"></i><span>Распечатай</span></div>
                <div class="action-btn edit-btn" title="Редактировать"><i class="fas fa-edit"></i><span>Изменить</span></div>
                <div class="action-btn delete-btn" title="Удалить"><i class="fas fa-trash-alt"></i><span>Удалить</span></div>
            </div>
            <div class="owner-switch" title="Сменить владельца">${ownerEmoji}</div>
            <div class="print-badge"><i class="fas fa-print"></i> РАСПЕЧАТАТЬ!</div>
            ${imgHtml}
            <div class="card-content">
                <div class="card-title">${escapeHtml(item.title)}</div>
                <div class="card-desc">${escapeHtml(item.description || '')}</div>
                <div class="price"><i class="fas fa-tag"></i> ${escapeHtml(priceText)}</div>
                <div class="completed-badge"><i class="fas fa-check-circle"></i> Исполнено!</div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" class="complete-chk" ${item.completed ? 'checked' : ''}>
                    <span>Исполнено</span>
                </div>
                <a href="${escapeHtml(item.shopLink)}" class="buy-link" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-cart-shopping"></i> ${escapeHtml(item.buttonText || 'Купить')}
                </a>
            </div>
        `;

        card.querySelector('.complete-chk').addEventListener('change', async (e) => {
            e.target.disabled = true;
            await saveCompleted(item.id, e.target.checked);
        });
        card.querySelector('.print-btn').onclick = (e) => { e.stopPropagation(); togglePrintMode(card, item.id); };
        card.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); openEditModal(item); };
        card.querySelector('.delete-btn').onclick = async (e) => { e.stopPropagation(); await deleteWish(item.id); };
        card.querySelector('.owner-switch').onclick = async (e) => {
            e.stopPropagation();
            let newOwner = 'common';
            if (item.owner === 'common') newOwner = 'me';
            else if (item.owner === 'me') newOwner = 'wife';
            else newOwner = 'common';
            await setOwner(item.id, newOwner);
        };
        return card;
    }

    function renderGrids(items) {
        const activeContainer = document.getElementById('activeGrid');
        const completedContainer = document.getElementById('completedGrid');

        let filtered = items;
        if (currentFilter !== 'all') filtered = items.filter(i => (i.owner || 'common') === currentFilter);
        let activeItems = filtered.filter(i => !i.completed);
        let completedItems = filtered.filter(i => i.completed);

        // Применяем локальный порядок
        activeItems = applyOrder(activeItems, false);
        completedItems = applyOrder(completedItems, true);

        activeContainer.innerHTML = '';
        completedContainer.innerHTML = '';

        if (currentTab === 'active') {
            const addCard = document.createElement('div');
            addCard.className = 'card add-card';
            addCard.innerHTML = `<div class="add-card-content"><i class="fas fa-plus-circle"></i><span>Добавить хотелку</span></div>`;
            addCard.onclick = () => {
                document.getElementById('editId').value = '';
                document.getElementById('editTitle').value = '';
                document.getElementById('editDesc').value = '';
                document.getElementById('editPrice').value = '';
                document.getElementById('editImageUrl').value = '';
                document.getElementById('editShopLink').value = '';
                document.getElementById('editButtonText').value = 'Купить';
                document.getElementById('editOwner').value = 'common';
                document.getElementById('modalTitle').innerText = '➕ Новая хотелка';
                document.getElementById('editModal').style.display = 'flex';
            };
            activeContainer.appendChild(addCard);
            activeItems.forEach(item => activeContainer.appendChild(createCardElement(item)));
            if (activeItems.length === 0 && activeContainer.children.length === 1) {
                activeContainer.innerHTML += '<div class="empty-message">📭 Нет активных желаний</div>';
            }
            // Инициализация Sortable
            if (sortable) sortable.destroy();
            sortable = new Sortable(activeContainer, {
                animation: 200,
                handle: '.card:not(.add-card)',
                onEnd: () => {
                    // Сохраняем новый порядок активных карточек
                    const cards = activeContainer.querySelectorAll('.card:not(.add-card)');
                    const newOrder = Array.from(cards).map(card => parseInt(card.dataset.id));
                    saveOrder(false, newOrder);
                }
            });
        } else {
            completedItems.forEach(item => completedContainer.appendChild(createCardElement(item)));
            if (completedItems.length === 0) completedContainer.innerHTML = '<div class="empty-message">🎉 Здесь будут исполненные</div>';
            // Инициализация Sortable для исполненных
            if (sortable) sortable.destroy();
            sortable = new Sortable(completedContainer, {
                animation: 200,
                handle: '.card',
                onEnd: () => {
                    const cards = completedContainer.querySelectorAll('.card');
                    const newOrder = Array.from(cards).map(card => parseInt(card.dataset.id));
                    saveOrder(true, newOrder);
                }
            });
        }
    }

    async function loadAndRender() {
        try {
            allItems = await fetchData();
            renderGrids(allItems);
            document.querySelectorAll('.wishlist-grid').forEach(g => g.style.display = 'none');
            if (currentTab === 'active') {
                document.getElementById('activeGrid').style.display = 'grid';
            } else {
                document.getElementById('completedGrid').style.display = 'grid';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('activeGrid').innerHTML = '<div class="loading">❌ Ошибка загрузки. Проверьте URL скрипта.</div>';
        }
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

    const modal = document.getElementById('editModal');
    document.getElementById('closeEditBtn').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    document.getElementById('saveEditBtn').onclick = async () => {
        const id = document.getElementById('editId').value;
        const title = document.getElementById('editTitle').value.trim();
        if (!title) { alert('Введите название'); return; }
        const wishData = {
            title,
            description: document.getElementById('editDesc').value,
            price: document.getElementById('editPrice').value,
            imageUrl: document.getElementById('editImageUrl').value,
            shopLink: document.getElementById('editShopLink').value,
            buttonText: document.getElementById('editButtonText').value || 'Купить',
            owner: document.getElementById('editOwner').value
        };
        let success;
        if (id === '') success = await addWish(wishData);
        else success = await updateWish(parseInt(id), wishData);
        if (success) modal.style.display = 'none';
        else alert('Ошибка при сохранении');
    };

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            loadAndRender();
        });
    });
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentTab === btn.dataset.tab) return;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            loadAndRender();
        });
    });

    loadPrintModes();
    loadAndRender();
    setInterval(loadAndRender, 20000);
</script>
</body>
</html>
